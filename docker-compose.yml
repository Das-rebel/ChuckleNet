version: '3.8'

services:
  chucklenet:
    build: .
    image: chucklenet/biosemiotic:latest
    container_name: chucklenet-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/best_model
      - DEVICE=cpu
      - LOG_LEVEL=info
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  chucklenet-gpu:
    build: .
    image: chucklenet/biosemiotic:latest
    container_name: chucklenet-api-gpu
    ports:
      - "8001:8000"
    environment:
      - MODEL_PATH=/app/models/best_model
      - DEVICE=cuda
      - LOG_LEVEL=info
    volumes:
      - ./models:/app/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped