<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <linearGradient id="bertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="bioGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#B91C1C"/>
    </linearGradient>
    <linearGradient id="gcacuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <linearGradient id="tomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cultGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2"/>
      <stop offset="100%" style="stop-color:#0E7490"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="fusionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#4338CA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="850" fill="#0F172A" rx="12"/>

  <!-- Title -->
  <rect width="1100" height="50" fill="url(#headerGrad)" rx="12" ry="12"/>
  <text x="550" y="32" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Biosemiotic Laughter Prediction Framework</text>

  <!-- ========== MAIN FLOW ROW ========== -->
  <!-- Input Layer -->
  <rect x="40" y="80" width="140" height="80" fill="url(#inputGrad)" rx="8" filter="url(#shadow)"/>
  <text x="110" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">INPUT</text>
  <text x="110" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#CBD5E1" text-anchor="middle">Social Media Text</text>
  <text x="110" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#CBD5E1" text-anchor="middle">(Reddit Jokes,</text>
  <text x="110" y="155" font-family="system-ui, sans-serif" font-size="9" fill="#CBD5E1" text-anchor="middle">Puns, Sarcasm)</text>

  <!-- Arrow Input -> BERT -->
  <path d="M180 120 L240 120" stroke="#4F46E5" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- BERT Encoder -->
  <rect x="250" y="60" width="200" height="100" fill="url(#bertGrad)" rx="8" filter="url(#shadow)"/>
  <text x="350" y="90" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">XLM-RoBERTa</text>
  <text x="350" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">Base Encoder (270M params)</text>
  <text x="350" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">768 hidden, 12 layers,</text>
  <text x="350" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">12 attention heads</text>

  <!-- Arrow BERT -> Output -->
  <path d="M450 120 L510 120" stroke="#4F46E5" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Output Layer -->
  <rect x="520" y="80" width="120" height="80" fill="url(#outputGrad)" rx="8" filter="url(#shadow)"/>
  <text x="580" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">OUTPUT</text>
  <text x="580" y="125" font-family="system-ui, sans-serif" font-size="10" fill="#EDE9FE" text-anchor="middle">Humor Score</text>
  <text x="580" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#EDE9FE" text-anchor="middle">(0-1 probability)</text>

  <!-- ========== BIOSEMIOTIC HEADS ROW ========== -->
  <!-- Down arrows from BERT to heads -->
  <path d="M320 160 L320 200" stroke="#4F46E5" stroke-width="2" fill="none"/>
  <path d="M320 200 L180 200 L180 220" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M320 200 L460 200 L460 220" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Duchenne Laughter Head -->
  <rect x="40" y="220" width="130" height="110" fill="url(#bioGrad)" rx="8" filter="url(#shadow)"/>
  <text x="105" y="245" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Duchenne Marker</text>
  <text x="105" y="265" font-family="system-ui, sans-serif" font-size="8" fill="#FECACA" text-anchor="middle">Spontaneous vs</text>
  <text x="105" y="278" font-family="system-ui, sans-serif" font-size="8" fill="#FECACA" text-anchor="middle">volitional laughter</text>
  <text x="105" y="295" font-family="system-ui, sans-serif" font-size="8" fill="#FECACA" text-anchor="middle">(brainstem/cortical)</text>
  <circle cx="105" cy="315" r="8" fill="white"/>
  <text x="105" y="319" font-family="system-ui, sans-serif" font-size="8" fill="#DC2626" text-anchor="middle">F1: 0.83</text>

  <!-- GCACU Incongruity Head -->
  <rect x="190" y="220" width="130" height="110" fill="url(#gcacuGrad)" rx="8" filter="url(#shadow)"/>
  <text x="255" y="245" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">GCACU Incongruity</text>
  <text x="255" y="265" font-family="system-ui, sans-serif" font-size="8" fill="#FEF3C7" text-anchor="middle">Semantic conflict</text>
  <text x="255" y="278" font-family="system-ui, sans-serif" font-size="8" fill="#FEF3C7" text-anchor="middle">detection for</text>
  <text x="255" y="291" font-family="system-ui, sans-serif" font-size="8" fill="#FEF3C7" text-anchor="middle">sarcasm recognition</text>
  <circle cx="255" cy="315" r="8" fill="white"/>
  <text x="255" y="319" font-family="system-ui, sans-serif" font-size="8" fill="#D97706" text-anchor="middle">Acc: 75%</text>

  <!-- Theory of Mind Head -->
  <rect x="340" y="220" width="130" height="110" fill="url(#tomGrad)" rx="8" filter="url(#shadow)"/>
  <text x="405" y="245" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Theory of Mind</text>
  <text x="405" y="265" font-family="system-ui, sans-serif" font-size="8" fill="#BFDBFE" text-anchor="middle">Mental state</text>
  <text x="405" y="278" font-family="system-ui, sans-serif" font-size="8" fill="#BFDBFE" text-anchor="middle">modeling for audience</text>
  <text x="405" y="291" font-family="system-ui, sans-serif" font-size="8" fill="#BFDBFE" text-anchor="middle">humor appreciation</text>
  <circle cx="405" cy="315" r="8" fill="white"/>
  <text x="405" y="319" font-family="system-ui, sans-serif" font-size="8" fill="#2563EB" text-anchor="middle">R²: 0.68</text>

  <!-- Cultural Adapter Head -->
  <rect x="490" y="220" width="130" height="110" fill="url(#cultGrad)" rx="8" filter="url(#shadow)"/>
  <text x="555" y="245" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Cultural Adapter</text>
  <text x="555" y="265" font-family="system-ui, sans-serif" font-size="8" fill="#A5F3FC" text-anchor="middle">Cross-regional</text>
  <text x="555" y="278" font-family="system-ui, sans-serif" font-size="8" fill="#A5F3FC" text-anchor="middle">comedy patterns</text>
  <text x="555" y="291" font-family="system-ui, sans-serif" font-size="8" fill="#A5F3FC" text-anchor="middle">& adaptive thresholds</text>
  <circle cx="555" cy="315" r="8" fill="white"/>
  <text x="555" y="319" font-family="system-ui, sans-serif" font-size="8" fill="#0891B2" text-anchor="middle">75.9%</text>

  <!-- Fusion Layer -->
  <rect x="660" y="100" width="130" height="100" fill="url(#fusionGrad)" rx="8" filter="url(#shadow)"/>
  <text x="725" y="125" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Attention Fusion</text>
  <text x="725" y="145" font-family="system-ui, sans-serif" font-size="8" fill="#C7D2FE" text-anchor="middle">Weighted biosemiotic</text>
  <text x="725" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#C7D2FE" text-anchor="middle">feature integration</text>
  <text x="725" y="175" font-family="system-ui, sans-serif" font-size="8" fill="#C7D2FE" text-anchor="middle">768→4→1</text>

  <!-- Arrows from heads to fusion -->
  <path d="M105 330 L105 360 L725 360 L725 200" stroke="#4F46E5" stroke-width="2" fill="none"/>
  <path d="M255 330 L255 360 L725 360" stroke="#4F46E5" stroke-width="2" fill="none"/>
  <path d="M405 330 L405 360 L725 360" stroke="#4F46E5" stroke-width="2" fill="none"/>
  <path d="M555 330 L555 360 L725 360" stroke="#4F46E5" stroke-width="2" fill="none"/>

  <!-- Arrow fusion to output -->
  <path d="M660 150 L580 150" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- ========== LEFT PANEL: KEY INSIGHTS ========== -->
  <rect x="40" y="360" width="250" height="280" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="165" y="385" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#FBBF24" text-anchor="middle">KEY INSIGHTS</text>

  <text x="55" y="410" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#F87171">1. Duchenne Laughter</text>
  <text x="55" y="428" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">• Distinguishes spontaneous</text>
  <text x="55" y="440" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">  brainstem laughter from</text>
  <text x="55" y="452" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">  deliberate cortical laughter</text>
  <text x="55" y="468" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">F1=0.83 on validation set</text>

  <text x="55" y="495" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FBBF24">2. GCACU Incongruity</text>
  <text x="55" y="513" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">• Generalized Cognitive Arch.</text>
  <text x="55" y="525" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">• Detects semantic conflicts</text>
  <text x="55" y="537" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">• Contextual resolution</text>
  <text x="55" y="553" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">Acc=75% for sarcasm</text>

  <text x="55" y="580" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FBBF24">3. Theory of Mind</text>
  <text x="55" y="598" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">• Mental state trajectory</text>
  <text x="55" y="610" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1">• Audience expectation modeling</text>
  <text x="55" y="622" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">R²=0.68 upvote prediction</text>

  <!-- ========== RIGHT PANEL: TRAINING INSIGHTS ========== -->
  <rect x="810" y="360" width="250" height="280" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="935" y="385" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#A78BFA" text-anchor="middle">TRAINING INSIGHTS</text>

  <text x="825" y="415" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#34D399">✓ Learning Rate: 2e-5</text>
  <text x="825" y="433" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">Optimal for BERT fine-tuning</text>
  <text x="825" y="445" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">vs 1e-4 (previous overfit)</text>

  <text x="825" y="475" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#34D399">✓ Warmup: 500 steps</text>
  <text x="825" y="493" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">Smooth loss trajectory</text>
  <text x="825" y="505" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">No loss spikes observed</text>

  <text x="825" y="535" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#34D399">✓ Early Stopping</text>
  <text x="825" y="553" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">Patience=2 epochs</text>
  <text x="825" y="565" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">Prevents overtraining</text>

  <text x="825" y="595" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#F87171">✗ Previous Run (LR=1e-4)</text>
  <text x="825" y="613" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">Loss spiked 0.15→0.49</text>
  <text x="825" y="625" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">at 35K samples (overfitting)</text>

  <!-- ========== CENTER: ARCHITECTURE DETAILS & LOSS CURVE ========== -->
  <rect x="310" y="360" width="250" height="130" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="435" y="385" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FBBF24" text-anchor="middle">MODEL ARCHITECTURE</text>
  <text x="325" y="408" font-family="monospace" font-size="8" fill="#94A3B8">Base: bert-base-uncased (110M params)</text>
  <text x="325" y="423" font-family="monospace" font-size="8" fill="#94A3B8">• 12 transformer layers</text>
  <text x="325" y="436" font-family="monospace" font-size="8" fill="#94A3B8">• 768 hidden dimension</text>
  <text x="325" y="449" font-family="monospace" font-size="8" fill="#94A3B8">• 12 attention heads</text>
  <text x="325" y="465" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#A78BFA">Biosemiotic Heads (512 dim):</text>
  <text x="325" y="480" font-family="monospace" font-size="8" fill="#94A3B8">• Duchenne: 512→256→1</text>
  <text x="325" y="493" font-family="monospace" font-size="8" fill="#94A3B8">• GCACU: 512→256→1</text>

  <rect x="310" y="500" width="250" height="140" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="435" y="522" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#4ADE80" text-anchor="middle">LOSS TRAJECTORY</text>
  <text x="435" y="540" font-family="system-ui, sans-serif" font-size="8" fill="#CBD5E1" text-anchor="middle">Training Loss: 0.2733 → 0.0735 (73% reduction)</text>

  <!-- Loss curve -->
  <path d="M330 600 L370 590 L410 575 L450 560 L490 550 L530 545" stroke="#4ADE80" stroke-width="2" fill="none"/>
  <text x="330" y="615" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8">0</text>
  <text x="410" y="615" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8">25K</text>
  <text x="490" y="615" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8">50K</text>
  <text x="545" y="615" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8">75K</text>
  <text x="315" y="555" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8">0.27</text>
  <text x="318" y="605" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8">0.07</text>
  <text x="435" y="635" font-family="system-ui, sans-serif" font-size="7" fill="#34D399">✓ Steady decrease, no spike</text>

  <!-- ========== RESULTS SUMMARY ========== -->
  <rect x="40" y="660" width="1020" height="80" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="550" y="685" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">RESULTS SUMMARY</text>

  <rect x="80" y="700" width="120" height="30" fill="#059669" rx="6"/>
  <text x="140" y="718" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">75% Accuracy</text>

  <rect x="230" y="700" width="120" height="30" fill="#D97706" rx="6"/>
  <text x="290" y="718" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">83% Pun F1</text>

  <rect x="380" y="700" width="120" height="30" fill="#2563EB" rx="6"/>
  <text x="440" y="718" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">R²: 0.68</text>

  <rect x="530" y="700" width="120" height="30" fill="#0891B2" rx="6"/>
  <text x="590" y="718" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">75.9% Cultural</text>

  <rect x="680" y="700" width="120" height="30" fill="#7C3AED" rx="6"/>
  <text x="740" y="718" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">73% Consistency</text>

  <rect x="830" y="700" width="120" height="30" fill="#DC2626" rx="6"/>
  <text x="890" y="718" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">81.3% Prev F1</text>

  <!-- Comparison arrow -->
  <text x="970" y="718" font-family="system-ui, sans-serif" font-size="9" fill="#34D399" text-anchor="middle">→ 82-84%</text>
  <text x="970" y="732" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">Target</text>

</svg>